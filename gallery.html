<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Galeri — Fuse Cafe & Grill</title>
<meta name="description" content="Suasana indoor Fuse Cafe & Grill Batam. Hangat, nyaman, cocok untuk keluarga dan meeting santai."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"/>
<link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<div id="site-nav"></div>

<section class="section">
  <div class="container">
    <div class="section-head reveal">
      <span class="eyebrow">Galeri</span>
      <h2>Suasana Fuse Cafe & Grill</h2>
      <p>Klik foto untuk memperbesar.</p>
    </div>
    <div id="gallery" class="gallery-grid reveal"></div>
  </div>
</section>

<div class="lightbox" id="lightbox"><img id="lb-img" alt=""/></div>

<div id="site-footer"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
(function(){
  const g = document.getElementById('gallery');
  g.innerHTML = window.GALLERY.map(src=>`<a href="#" data-src="${src}"><img loading="lazy" src="${src}" alt="Interior Fuse Cafe & Grill"/></a>`).join('');
  const lb = document.getElementById('lightbox');
  const lbi = document.getElementById('lb-img');
  g.addEventListener('click', e=>{
    const a = e.target.closest('a'); if(!a) return;
    e.preventDefault();
    lbi.src = a.dataset.src;
    lb.classList.add('open');
  });
  lb.addEventListener('click', ()=> lb.classList.remove('open'));
})();
</script>
</body>
</html>
